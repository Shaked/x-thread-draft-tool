name: Keep Supabase alive

on:
  schedule:
    - cron: '17 8 * * *' # Daily at 08:17 UTC
  workflow_dispatch:

# Hitting /rest/v1/ returns PostgREST's cached OpenAPI schema and does NOT
# execute SQL — Supabase doesn't count that as activity, so the project
# still gets paused. We instead invoke an RPC that runs a trivial query.
jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
    steps:
      - name: Run keepalive query
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SECRET_KEY}" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_SECRET_KEY secret"
            exit 1
          fi

          response=$(mktemp)
          status=$(curl -sS -o "$response" -w "%{http_code}" -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/keepalive" \
            -H "apikey: ${SUPABASE_SECRET_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SECRET_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Response status: $status"
          echo "Response body:"
          cat "$response"
          echo
          if [ "$status" -ge 400 ]; then
            echo "::error::Keepalive RPC failed with status $status"
            exit 1
          fi
