name: Keep Supabase alive

on:
  schedule:
    - cron: '0 8 */3 * *' # Every 3 days at 8am UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      # Use the new publishable key (sb_publishable_...) from
      # Supabase Dashboard → Settings → API Keys → "Publishable and secret API keys".
      # Legacy anon JWT keys are deprecated and may be rotated/invalidated.
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Ping Supabase REST API
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_PUBLISHABLE_KEY}" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_PUBLISHABLE_KEY secret"
            exit 1
          fi
          # Hit an actual table instead of the /rest/v1/ root. With the
          # new API key system, /rest/v1/ is privileged and only accepts
          # secret keys ("Secret API key required"). A lightweight query
          # against a public table works with the publishable key, is
          # subject to normal RLS, and counts as real database activity,
          # which is what actually keeps the project from auto-pausing.
          response=$(mktemp)
          status=$(curl -sS -o "$response" -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/drafts?select=id&limit=1" \
            -H "apikey: ${SUPABASE_PUBLISHABLE_KEY}")
          echo "Response status: $status"
          echo "Response body:"
          cat "$response"
          echo
          if [ "$status" -ge 400 ]; then
            echo "::error::Supabase ping failed with status $status"
            exit 1
          fi
